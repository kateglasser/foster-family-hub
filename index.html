// Focus trap hook for modals
function useFocusTrap(isOpen) {
  const ref = useRef(null);
  const previousFocus = useRef(null);
  useEffect(() => {
    if (!isOpen) return;
    previousFocus.current = document.activeElement;
    const trap = ref.current; if (!trap) return;
    const focusable = trap.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
    const first = focusable[0]; const last = focusable[focusable.length - 1];
    if (first) first.focus();
    function handleKeyDown(e) {
      if (e.key === 'Escape') { e.preventDefault(); if (previousFocus.current) previousFocus.current.click(); return; }
      if (e.key !== 'Tab') return;
      if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
      else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
    }
    trap.addEventListener('keydown', handleKeyDown);
    return () => { trap.removeEventListener('keydown', handleKeyDown); if (previousFocus.current) previousFocus.current.focus(); };
  }, [isOpen]);
  return ref;
}

              {emergencyNumbers.map((item,i)=><li key={i}><AnimCard delay={i+11}><a href={`tel:${item.number.replace(/[^0-9]/g,"")}`} aria-label={`Call ${item.label} at ${item.number}`} style={{background:"#FFFBF5",borderRadius:18,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,textDecoration:"none",border:"2.5px solid #F0E4D8"}}>

                <div style={{flex:1}}><div style={{fontFamily:"'Quicksand',sans-serif",fontWeight:700,fontSize:12,color:"#8B7A6B"}}>{item.label}</div><div style={{fontFamily:"'Baloo 2',sans-serif",fontSize:17,color:"#2D1B4E",fontWeight:800}}>{item.number}</div></div>
                <div aria-hidden="true" style={{width:36,height:36,borderRadius:12,background:"linear-gradient(135deg,#26DE81,#20BF6B)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>📞</div>
              </a></AnimCard></li>)}
            </ul>
          </section>
        </>}
      </div>}

      {tab==="home"&&cat&&<section aria-label={`${CATEGORIES.find(c=>c.id===cat)?.label} resources`} style={{padding:"16px 18px",position:"relative",zIndex:1}}>
        <button onClick={()=>{setCat(null);setAnnouncement("Returned to categories")}} aria-label="Back to all categories" style={{background:"linear-gradient(135deg,#FF6B6B22,#ee5a2422)",border:"2px solid #FF6B6B33",fontFamily:"'Baloo 2',sans-serif",fontSize:14,fontWeight:700,color:"#FF6B6B",cursor:"pointer",padding:"7px 14px",borderRadius:12,display:"flex",alignItems:"center",gap:5}}><span aria-hidden="true">←</span> Back</button>
        <div style={{display:"flex",alignItems:"center",gap:12,margin:"12px 0 14px"}}>
          <div aria-hidden="true" style={{width:48,height:48,borderRadius:16,background:CATEGORIES.find(c=>c.id===cat)?.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{CATEGORIES.find(c=>c.id===cat)?.icon}</div>
          <div><h2 style={{margin:0,fontFamily:"'Baloo 2',sans-serif",fontSize:20,fontWeight:800,color:"#2D1B4E"}}>{CATEGORIES.find(c=>c.id===cat)?.label}</h2>{county!=="all"&&<span style={{fontFamily:"'Quicksand',sans-serif",fontSize:12,color:"#5E35B1",fontWeight:700}}><span aria-hidden="true">📍</span> {countyLabel}</span>}</div>
        </div>
        {county!=="all"&&<div style={{display:"flex",gap:8,marginBottom:14}}>
          <span style={{background:"linear-gradient(135deg,#A55EEA22,#8854d022)",borderRadius:10,padding:"4px 12px",fontSize:11,fontWeight:700,color:"#8854d0",border:"1.5px solid #A55EEA33"}}><span aria-hidden="true">📍</span> Local: {filteredResources.filter(r=>!r.co.includes("statewide")).length}</span>
          <span style={{background:"#F0E4D8",borderRadius:10,padding:"4px 12px",fontSize:11,fontWeight:700,color:"#8B7A6B"}}><span aria-hidden="true">🌍</span> Statewide: {filteredResources.filter(r=>r.co.includes("statewide")).length}</span>
        </div>}
        {filteredResources.length===0?<div role="status" style={{textAlign:"center",padding:40}}><div aria-hidden="true" style={{fontSize:50,marginBottom:12}}>📭</div><p style={{fontFamily:"'Baloo 2',sans-serif",fontWeight:700,color:"#2D1B4E"}}>No resources here</p><p style={{fontFamily:"'Quicksand',sans-serif",fontSize:13,color:"#8B7A6B"}}>Try a different county</p></div>:<>
          {county!=="all"&&filteredResources.filter(r=>!r.co.includes("statewide")).length>0&&<div style={{marginBottom:16}}><div style={{fontFamily:"'Baloo 2',sans-serif",fontSize:14,fontWeight:800,color:"#5E35B1",marginBottom:8}}><span aria-hidden="true">📍</span> Local to {countyLabel}</div><ul role="list" style={{listStyle:"none",padding:0,margin:0}}>{filteredResources.filter(r=>!r.co.includes("statewide")).map((r,i)=><li key={r.id}><Item res={r} onClick={()=>setSel(r)} idx={i}/></li>)}</ul></div>}
          {county!=="all"&&filteredResources.filter(r=>r.co.includes("statewide")).length>0&&<div><div style={{fontFamily:"'Baloo 2',sans-serif",fontSize:14,fontWeight:800,color:"#8B7A6B",marginBottom:8}}><span aria-hidden="true">🌍</span> Available Statewide</div><ul role="list" style={{listStyle:"none",padding:0,margin:0}}>{filteredResources.filter(r=>r.co.includes("statewide")).map((r,i)=><li key={r.id}><Item res={r} onClick={()=>setSel(r)} idx={i}/></li>)}</ul></div>}
          {county==="all"&&<ul role="list" style={{listStyle:"none",padding:0,margin:0}}>{filteredResources.map((r,i)=><li key={r.id}><Item res={r} onClick={()=>setSel(r)} idx={i}/></li>)}</ul>}
        </>}
      </section>}

      {tab==="events"&&<section aria-label="Upcoming events" style={{padding:"20px 18px",paddingBottom:100,position:"relative",zIndex:1}}>
        <h2 style={{margin:"0 0 4px",fontFamily:"'Baloo 2',sans-serif",fontSize:22,fontWeight:800,color:"#2D1B4E"}}>Upcoming Events <span aria-hidden="true">📅</span></h2>
        <p style={{margin:"0 0 16px",fontFamily:"'Quicksand',sans-serif",fontSize:13,color:"#8B7A6B",fontWeight:600}}>{county==="all"?"Events across all of Illinois":"Events for "+countyLabel+" & statewide"} • Next 2 months</p>
        {filteredEvents.length===0?<div role="status" style={{textAlign:"center",padding:40}}><div aria-hidden="true" style={{fontSize:50,marginBottom:12}}>📅</div><p style={{fontFamily:"'Baloo 2',sans-serif",fontWeight:700,color:"#2D1B4E"}}>No upcoming events</p><p style={{fontFamily:"'Quicksand',sans-serif",fontSize:13,color:"#8B7A6B"}}>Try a different county or check back soon</p></div>:
        <>
          {[...new Set(filteredEvents.map(ev=>{const d=new Date(ev.date+"T12:00:00");return d.toLocaleString("en-US",{month:"long",year:"numeric"})}))].map(monthLabel=>{
            const monthEvents=filteredEvents.filter(ev=>{const d=new Date(ev.date+"T12:00:00");return d.toLocaleString("en-US",{month:"long",year:"numeric"})===monthLabel});
            return <div key={monthLabel} style={{marginBottom:20}}>
              <div style={{fontFamily:"'Baloo 2',sans-serif",fontSize:16,fontWeight:800,color:"#5E35B1",marginBottom:10,display:"flex",alignItems:"center",gap:8}}><div aria-hidden="true" style={{width:6,height:6,borderRadius:"50%",background:"#A55EEA"}}/>{monthLabel}<span style={{fontFamily:"'Quicksand',sans-serif",fontSize:11,fontWeight:600,color:"#8B7A6B",marginLeft:4}}>({monthEvents.length})</span></div>
              <ul role="list" style={{listStyle:"none",padding:0,margin:0}}>{monthEvents.map((ev,i)=><li key={ev.id}><EventItem ev={ev} onClick={()=>setSelEv(ev)} idx={i}/></li>)}</ul>
            </div>
          })}
        </>}
      </section>}

      {tab==="help"&&<section aria-label="Important phone numbers" style={{padding:"20px 18px",paddingBottom:100,position:"relative",zIndex:1}}>
        <h2 style={{margin:"0 0 4px",fontFamily:"'Baloo 2',sans-serif",fontSize:22,fontWeight:800,color:"#2D1B4E"}}>Important Numbers <span aria-hidden="true">📞</span></h2>
        <p style={{margin:"0 0 18px",fontFamily:"'Quicksand',sans-serif",fontSize:13,color:"#8B7A6B",fontWeight:600}}>Tap to call directly — help is one tap away</p>
        <ul role="list" style={{listStyle:"none",padding:0,margin:0}}>
        {[
          {icon:"🚨",title:"Report Child Abuse/Neglect",number:"1-800-252-2873",subtitle:"24/7 DCFS Hotline",bg:"linear-gradient(135deg,#FF6B6B,#ee5a24)"},
          {icon:"📞",title:"Foster Parent Helpline",number:"866-368-5204",subtitle:"DCFS trained staff",bg:"linear-gradient(135deg,#20BF6B,#0fb85e)"},
          {icon:"🤝",title:"DCFS Advocacy Office",number:"800-232-3798",subtitle:"Navigate the system",bg:"linear-gradient(135deg,#4B7BEC,#3867d6)"},
          {icon:"🏛️",title:"DCFS General Inquiries",number:"312-814-6800",subtitle:"Main office line",bg:"linear-gradient(135deg,#F7B731,#e8a317)"},
          {icon:"💙",title:"988 Crisis Lifeline",number:"988",subtitle:"24/7 mental health",bg:"linear-gradient(135deg,#A55EEA,#8854d0)"},
          {icon:"🆘",title:"CARES Crisis Hotline",number:"800-349-9049",subtitle:"Youth mental health",bg:"linear-gradient(135deg,#FC5C65,#eb3b5a)"},
          {icon:"👶",title:"Fussy Baby Network",number:"888-431-2229",subtitle:"Infant specialists",bg:"linear-gradient(135deg,#26DE81,#0fb966)"},
          {icon:"👨‍👩‍👧‍👦",title:"Metropolitan Family Services",number:"312-655-8357",subtitle:"Post-adoption (Cook)",bg:"linear-gradient(135deg,#4B7BEC,#3867d6)"},
          {icon:"🏠",title:"Mimi's House (Lake Co.)",number:"847-242-1126",subtitle:"Foster family advocacy",bg:"linear-gradient(135deg,#F7B731,#e8a317)"},
          {icon:"📚",title:"DCFS Life Skills",number:"217-557-2689",subtitle:"Youth ages 14–20",bg:"linear-gradient(135deg,#A55EEA,#8854d0)"},
        ].map((item,i)=><li key={i}><AnimCard delay={i}><a href={`tel:${item.number.replace(/[^0-9]/g,"")}`} aria-label={`Call ${item.title} at ${item.number}. ${item.subtitle}`} style={{display:"block",background:"#FFFBF5",border:"2.5px solid #F0E4D8",borderRadius:22,padding:"16px 18px",marginBottom:12,textDecoration:"none"}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div aria-hidden="true" style={{width:50,height:50,borderRadius:16,background:item.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{item.icon}</div>
            <div style={{flex:1}}><div style={{fontFamily:"'Baloo 2',sans-serif",fontWeight:800,fontSize:14,color:"#2D1B4E"}}>{item.title}</div><div style={{fontFamily:"'Baloo 2',sans-serif",fontSize:22,fontWeight:800,color:"#2D1B4E",margin:"1px 0"}}>{item.number}</div><div style={{fontFamily:"'Quicksand',sans-serif",fontSize:12,fontWeight:600,color:"#8B7A6B"}}>{item.subtitle}</div></div>
            <div aria-hidden="true" style={{width:44,height:44,borderRadius:14,background:"linear-gradient(135deg,#26DE81,#20BF6B)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>📞</div>
          </div>
        </a></AnimCard></li>)}
        </ul>
      </section>}
    </main>

    <nav aria-label="Main navigation" style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(255,251,245,0.92)",backdropFilter:"blur(20px)",borderTop:"2px solid #F0E4D8",display:"flex",justifyContent:"space-around",padding:"6px 0 14px",zIndex:50}}>
      {[{id:"home",icon:"🏠",label:"Home"},{id:"events",icon:"📅",label:"Events"},{id:"help",icon:"📞",label:"Helplines"}].map(navItem=><button key={navItem.id} className="nav-btn" onClick={()=>{setTab(navItem.id);setCat(null);setSearchQuery("");setShowSearch(false);setAnnouncement(`Navigated to ${navItem.label}`)}} aria-label={navItem.label} aria-current={tab===navItem.id?"page":undefined} style={{background:tab===navItem.id?"linear-gradient(135deg,#FF6B6B15,#F7B73115)":"none",border:tab===navItem.id?"2px solid #FF6B6B22":"2px solid transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"10px 24px",minHeight:44,borderRadius:16}}>
        <span aria-hidden="true" style={{fontSize:24,filter:tab===navItem.id?"none":"grayscale(0.5)",opacity:tab===navItem.id?1:0.5}}>{navItem.icon}</span>
        <span style={{fontSize:11,fontWeight:tab===navItem.id?800:600,color:tab===navItem.id?"#FF6B6B":"#8B7A6B",fontFamily:"'Baloo 2',sans-serif"}}>{navItem.label}</span>
      </button>)}
    </nav>

    {showCounty&&<CountyPicker sel={county} onSel={setCounty} onClose={()=>setShowCounty(false)}/>}
    {sel&&<Sheet res={sel} onClose={()=>setSel(null)}/>}
    {selEv&&<EventSheet ev={selEv} onClose={()=>setSelEv(null)}/>}
  </div>);
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
  <!-- Update banner (hidden by default) -->
  <div id="update-banner" style="display:none;position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:9998;padding:10px 16px;background:linear-gradient(135deg,#4B7BEC,#3867d6);box-shadow:0 4px 20px rgba(75,123,236,0.35);font-family:'Quicksand',sans-serif;animation:fadeSlide 0.4s ease" role="alert">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:18px" aria-hidden="true">✨</span>
      <span style="flex:1;color:#fff;font-size:13px;font-weight:600">A new version is available!</span>
      <button onclick="window.location.reload()" style="background:#fff;color:#3867d6;border:none;border-radius:10px;padding:7px 16px;font-family:'Baloo 2',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap">Refresh</button>
      <button onclick="document.getElementById('update-banner').style.display='none'" aria-label="Dismiss update notification" style="background:none;border:none;color:rgba(255,255,255,0.7);font-size:18px;cursor:pointer;padding:4px 8px;line-height:1">✕</button>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js').then(function(registration) {
          // Check for updates on load and every 60 seconds
          registration.update();
          setInterval(function() { registration.update(); }, 60000);

          // When a new service worker is found, show the update banner
          registration.addEventListener('updatefound', function() {
            var newWorker = registration.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', function() {
              // Only show banner if there's already an active worker (i.e., this is an update, not first install)
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                document.getElementById('update-banner').style.display = 'block';
              }
            });
          });
        }).catch(function() {});
      });
    }
  </script>
