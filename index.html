function FloatingShapes() {

    { t:"circle", x:"85%", y:"8%", s:30, c:"rgba(75,123,236,0.10)", delay:1.5 },

  ];
  return <>{shapes.map((sh,i)=><div key={i} style={{position:"absolute",left:sh.x,top:sh.y,width:sh.s,height:sh.s,borderRadius:"50%",background:sh.c,animation:`bobble ${3+i*0.5}s ease-in-out infinite`,animationDelay:`${sh.delay}s`,pointerEvents:"none"}} />)}</>;
}

// ─── Card with staggered animation ───
function AnimCard({children, delay=0, style={}}) {
  const [vis,setVis]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setVis(true),delay*80);return()=>clearTimeout(t)},[delay]);
  return <div style={{opacity:vis?1:0,transform:vis?"translateY(0) scale(1)":"translateY(18px) scale(0.97)",transition:"all 0.45s cubic-bezier(0.34,1.56,0.64,1)",...style}}>{children}</div>;
}

        <button onClick={()=>setCat(null)} style={{background:"linear-gradient(135deg,#FF6B6B22,#ee5a2422)",border:"2px solid #FF6B6B33",fontFamily:"'Baloo 2',sans-serif",fontSize:14,fontWeight:700,color:"#FF6B6B",cursor:"pointer",padding:"7px 14px",borderRadius:12,display:"flex",alignItems:"center",gap:5}}>← Back</button>
        <div style={{display:"flex",alignItems:"center",gap:12,margin:"12px 0 14px"}}>
          <div style={{width:48,height:48,borderRadius:16,background:CATEGORIES.find(c=>c.id===cat)?.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,boxShadow:`0 4px 15px ${CATEGORIES.find(c=>c.id===cat)?.color}25`}}>{CATEGORIES.find(c=>c.id===cat)?.icon}</div>
          <div><h2 style={{margin:0,fontFamily:"'Baloo 2',sans-serif",fontSize:20,fontWeight:800,color:"#2D1B4E"}}>{CATEGORIES.find(c=>c.id===cat)?.label}</h2>{county!=="all"&&<span style={{fontFamily:"'Quicksand',sans-serif",fontSize:12,color:"#5E35B1",fontWeight:700}}>📍 {cl}</span>}</div>
        </div>
        {county!=="all"&&<div style={{display:"flex",gap:8,marginBottom:14}}>
          <span style={{background:"linear-gradient(135deg,#A55EEA22,#8854d022)",borderRadius:10,padding:"4px 12px",fontSize:11,fontWeight:700,color:"#8854d0",border:"1.5px solid #A55EEA33"}}>📍 Local: {fr.filter(r=>!r.co.includes("statewide")).length}</span>
          <span style={{background:"#F0E4D8",borderRadius:10,padding:"4px 12px",fontSize:11,fontWeight:700,color:"#8B7A6B"}}>🌍 Statewide: {fr.filter(r=>r.co.includes("statewide")).length}</span>
        </div>}
        {fr.length===0?<div style={{textAlign:"center",padding:40}}><div style={{fontSize:50,marginBottom:12,animation:"wiggle 1s ease-in-out infinite"}}>📭</div><p style={{fontFamily:"'Baloo 2',sans-serif",fontWeight:700,color:"#2D1B4E"}}>No resources here</p><p style={{fontFamily:"'Quicksand',sans-serif",fontSize:13,color:"#8B7A6B"}}>Try a different county</p></div>:<>
          {county!=="all"&&fr.filter(r=>!r.co.includes("statewide")).length>0&&<div style={{marginBottom:16}}><div style={{fontFamily:"'Baloo 2',sans-serif",fontSize:14,fontWeight:800,color:"#5E35B1",marginBottom:8}}>📍 Local to {cl}</div>{fr.filter(r=>!r.co.includes("statewide")).map((r,i)=><Item key={r.id} res={r} onClick={()=>setSel(r)} idx={i}/>)}</div>}
          {county!=="all"&&fr.filter(r=>r.co.includes("statewide")).length>0&&<div><div style={{fontFamily:"'Baloo 2',sans-serif",fontSize:14,fontWeight:800,color:"#8B7A6B",marginBottom:8}}>🌍 Available Statewide</div>{fr.filter(r=>r.co.includes("statewide")).map((r,i)=><Item key={r.id} res={r} onClick={()=>setSel(r)} idx={i}/>)}</div>}
          {county==="all"&&fr.map((r,i)=><Item key={r.id} res={r} onClick={()=>setSel(r)} idx={i}/>)}
        </>}
      </div>}

      {/* ═══ HELPLINES ═══ */}
      {tab==="help"&&<div style={{padding:"20px 18px",paddingBottom:100,position:"relative",zIndex:1}}>
        <h2 style={{margin:"0 0 4px",fontFamily:"'Baloo 2',sans-serif",fontSize:22,fontWeight:800,color:"#2D1B4E"}}>Important Numbers 📞</h2>
        <p style={{margin:"0 0 18px",fontFamily:"'Quicksand',sans-serif",fontSize:13,color:"#8B7A6B",fontWeight:600}}>Tap to call directly — help is one tap away</p>
        {[
          {i:"🚨",t:"Report Child Abuse/Neglect",n:"1-800-252-2873",s:"24/7 DCFS Hotline",bg:"linear-gradient(135deg,#FF6B6B,#ee5a24)"},
          {i:"📞",t:"Foster Parent Helpline",n:"866-368-5204",s:"DCFS trained staff",bg:"linear-gradient(135deg,#20BF6B,#0fb85e)"},
          {i:"🤝",t:"DCFS Advocacy Office",n:"800-232-3798",s:"Navigate the system",bg:"linear-gradient(135deg,#4B7BEC,#3867d6)"},
          {i:"🏛️",t:"DCFS General Inquiries",n:"312-814-6800",s:"Main office line",bg:"linear-gradient(135deg,#F7B731,#e8a317)"},
          {i:"💙",t:"988 Crisis Lifeline",n:"988",s:"24/7 mental health",bg:"linear-gradient(135deg,#A55EEA,#8854d0)"},
          {i:"🆘",t:"CARES Crisis Hotline",n:"800-349-9049",s:"Youth mental health",bg:"linear-gradient(135deg,#FC5C65,#eb3b5a)"},
          {i:"👶",t:"Fussy Baby Network",n:"888-431-2229",s:"Infant specialists",bg:"linear-gradient(135deg,#26DE81,#0fb966)"},
          {i:"👨‍👩‍👧‍👦",t:"Metropolitan Family Services",n:"312-655-8357",s:"Post-adoption (Cook)",bg:"linear-gradient(135deg,#4B7BEC,#3867d6)"},
          {i:"🏠",t:"Mimi's House (Lake Co.)",n:"847-242-1126",s:"Foster family advocacy",bg:"linear-gradient(135deg,#F7B731,#e8a317)"},
          {i:"📚",t:"DCFS Life Skills",n:"217-557-2689",s:"Youth ages 14–20",bg:"linear-gradient(135deg,#A55EEA,#8854d0)"},
        ].map((it,i)=><AnimCard key={i} delay={i}><a href={`tel:${it.n.replace(/-/g,"")}`} style={{display:"block",background:"#FFFBF5",border:"2.5px solid #F0E4D8",borderRadius:22,padding:"16px 18px",marginBottom:12,textDecoration:"none",boxShadow:"0 3px 15px rgba(45,27,78,0.04)"}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:50,height:50,borderRadius:16,background:it.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,boxShadow:"0 4px 15px rgba(0,0,0,0.1)",flexShrink:0}}>{it.i}</div>
            <div style={{flex:1}}><div style={{fontFamily:"'Baloo 2',sans-serif",fontWeight:800,fontSize:14,color:"#2D1B4E"}}>{it.t}</div><div style={{fontFamily:"'Baloo 2',sans-serif",fontSize:22,fontWeight:800,color:"#2D1B4E",margin:"1px 0"}}>{it.n}</div><div style={{fontFamily:"'Quicksand',sans-serif",fontSize:12,fontWeight:600,color:"#8B7A6B"}}>{it.s}</div></div>
            <div style={{width:42,height:42,borderRadius:14,background:"linear-gradient(135deg,#26DE81,#20BF6B)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,boxShadow:"0 3px 10px rgba(32,191,107,0.25)",flexShrink:0}}>📞</div>
          </div>
        </a></AnimCard>)}
      </div>}
    </div>

    {/* ═══ BOTTOM NAV ═══ */}
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(255,251,245,0.92)",backdropFilter:"blur(20px)",borderTop:"2px solid #F0E4D8",display:"flex",justifyContent:"space-around",padding:"6px 0 14px",zIndex:50}}>
      {[{id:"home",ic:"🏠",l:"Home"},{id:"help",ic:"📞",l:"Helplines"}].map(t=><button key={t.id} className="nav-btn" onClick={()=>{setTab(t.id);setCat(null);setQ("");setShowS(false)}} style={{background: tab===t.id?"linear-gradient(135deg,#FF6B6B15,#F7B73115)":"none",border:tab===t.id?"2px solid #FF6B6B22":"2px solid transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"8px 28px",borderRadius:16,transition:"all 0.2s"}}>
        <span style={{fontSize:24,filter:tab===t.id?"none":"grayscale(0.5)",opacity:tab===t.id?1:0.5,transition:"all 0.2s"}}>{t.ic}</span>
        <span style={{fontSize:11,fontWeight:tab===t.id?800:600,color:tab===t.id?"#FF6B6B":"#8B7A6B",fontFamily:"'Baloo 2',sans-serif"}}>{t.l}</span>
      </button>)}
    </div>

    {showC&&<CountyPicker sel={county} onSel={setCounty} onClose={()=>setShowC(false)}/>}
    {sel&&<Sheet res={sel} onClose={()=>setSel(null)}/>}
  </div>);
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
