// ─── SMART EVENT ENGINE ───
// Generates events dynamically based on today's date.
// Recurring events auto-roll forward every month/quarter/year.
// No manual updates needed — the calendar stays fresh forever.

function generateEvents() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const twoMonthsOut = new Date(today);
  twoMonthsOut.setMonth(twoMonthsOut.getMonth() + 2);
  twoMonthsOut.setDate(twoMonthsOut.getDate() + 7); // slight buffer

  // Helper: get Nth weekday of a month (e.g., 3rd Thursday)
  function nthWeekday(year, month, weekday, n) {
    const first = new Date(year, month, 1);
    let day = 1 + ((weekday - first.getDay() + 7) % 7);
    day += (n - 1) * 7;
    if (day > new Date(year, month + 1, 0).getDate()) return null;
    return new Date(year, month, day);
  }

  // Helper: last weekday of a month
  function lastWeekday(year, month, weekday) {
    const last = new Date(year, month + 1, 0);
    const diff = (last.getDay() - weekday + 7) % 7;
    return new Date(year, month, last.getDate() - diff);
  }

  // Helper: format date as YYYY-MM-DD
  function fmt(d) {
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }

  // Generate dates for each month in the window
  const months = [];
  let cursor = new Date(today.getFullYear(), today.getMonth(), 1);
  while (cursor <= twoMonthsOut) {
    months.push({ y: cursor.getFullYear(), m: cursor.getMonth() });
    cursor.setMonth(cursor.getMonth() + 1);
  }

  const events = [];
  let eid = 1;

  // ──────────────────────────────────────────
  // MONTHLY RECURRING EVENTS (happen every month)
  // ──────────────────────────────────────────

  const monthlyTemplates = [
    // 3rd Wednesday — LCFS Foster Parent Info Meeting

function FloatingShapes() {
  const shapes = [
    { t:"circle", x:"8%", y:"15%", s:45, c:"rgba(255,107,107,0.12)", delay:0 },
    { t:"circle", x:"85%", y:"8%", s:30, c:"rgba(75,123,236,0.10)", delay:1.5 },
    { t:"circle", x:"70%", y:"55%", s:55, c:"rgba(247,183,49,0.08)", delay:0.8 },
    { t:"circle", x:"15%", y:"70%", s:35, c:"rgba(165,94,234,0.10)", delay:2 },
    { t:"circle", x:"50%", y:"30%", s:25, c:"rgba(38,222,129,0.09)", delay:1.2 },
  ];
  return <>{shapes.map((sh,i)=><div key={i} style={{position:"absolute",left:sh.x,top:sh.y,width:sh.s,height:sh.s,borderRadius:"50%",background:sh.c,animation:`bobble ${3+i*0.5}s ease-in-out infinite`,animationDelay:`${sh.delay}s`,pointerEvents:"none"}} />)}</>;
}

// ─── Card with staggered animation ───
function AnimCard({children, delay=0, style={}}) {
  const [vis,setVis]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setVis(true),delay*80);return()=>clearTimeout(t)},[delay]);
  return <div style={{opacity:vis?1:0,transform:vis?"translateY(0) scale(1)":"translateY(18px) scale(0.97)",transition:"all 0.45s cubic-bezier(0.34,1.56,0.64,1)",...style}}>{children}</div>;
}

function EventItem({ev,onClick,idx}){

        <h2 style={{margin:"0 0 4px",fontFamily:"'Baloo 2',sans-serif",fontSize:22,fontWeight:800,color:"#2D1B4E"}}>Upcoming Events 📅</h2>
        <p style={{margin:"0 0 6px",fontFamily:"'Quicksand',sans-serif",fontSize:13,color:"#8B7A6B",fontWeight:600}}>
          {county==="all"?"Events across all of Illinois":"Events for "+cl+" & statewide"} • Next 2 months
        </p>
        <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"linear-gradient(135deg,#26DE8118,#20BF6B18)",border:"1.5px solid #26DE8133",borderRadius:10,padding:"4px 10px",marginBottom:16}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:"#26DE81",animation:"pulse 2s ease infinite"}}/>
          <span style={{fontFamily:"'Quicksand',sans-serif",fontSize:10,fontWeight:700,color:"#20BF6B"}}>Auto-updating • Always current</span>
        </div>

        {filteredEvents.length===0?<div style={{textAlign:"center",padding:40}}><div style={{fontSize:50,marginBottom:12,animation:"wiggle 1s ease-in-out infinite"}}>📅</div><p style={{fontFamily:"'Baloo 2',sans-serif",fontWeight:700,color:"#2D1B4E"}}>No upcoming events</p><p style={{fontFamily:"'Quicksand',sans-serif",fontSize:13,color:"#8B7A6B"}}>Try selecting a different county or check back soon</p></div>:
        <>
          {/* Group by month */}
          {[...new Set(filteredEvents.map(ev=>{const d=new Date(ev.date+"T12:00:00");return d.toLocaleString("en-US",{month:"long",year:"numeric"})}))].map((monthLabel,mi)=>{
            const monthEvents=filteredEvents.filter(ev=>{const d=new Date(ev.date+"T12:00:00");return d.toLocaleString("en-US",{month:"long",year:"numeric"})===monthLabel});
            return <div key={monthLabel} style={{marginBottom:20}}>
              <div style={{fontFamily:"'Baloo 2',sans-serif",fontSize:16,fontWeight:800,color:"#5E35B1",marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:"#A55EEA"}}/>
                {monthLabel}
                <span style={{fontFamily:"'Quicksand',sans-serif",fontSize:11,fontWeight:600,color:"#8B7A6B",marginLeft:4}}>({monthEvents.length})</span>
              </div>
              {monthEvents.map((ev,i)=><EventItem key={ev.id} ev={ev} onClick={()=>setSelEv(ev)} idx={i}/>)}
            </div>
          })}
        </>}
      </div>}

      {/* ═══ HELPLINES ═══ */}
      {tab==="help"&&<div style={{padding:"20px 18px",paddingBottom:100,position:"relative",zIndex:1}}>
        <h2 style={{margin:"0 0 4px",fontFamily:"'Baloo 2',sans-serif",fontSize:22,fontWeight:800,color:"#2D1B4E"}}>Important Numbers 📞</h2>
        <p style={{margin:"0 0 18px",fontFamily:"'Quicksand',sans-serif",fontSize:13,color:"#8B7A6B",fontWeight:600}}>Tap to call directly — help is one tap away</p>
        {[
          {i:"🚨",t:"Report Child Abuse/Neglect",n:"1-800-252-2873",s:"24/7 DCFS Hotline",bg:"linear-gradient(135deg,#FF6B6B,#ee5a24)"},
          {i:"📞",t:"Foster Parent Helpline",n:"866-368-5204",s:"DCFS trained staff",bg:"linear-gradient(135deg,#20BF6B,#0fb85e)"},
          {i:"🤝",t:"DCFS Advocacy Office",n:"800-232-3798",s:"Navigate the system",bg:"linear-gradient(135deg,#4B7BEC,#3867d6)"},
          {i:"🏛️",t:"DCFS General Inquiries",n:"312-814-6800",s:"Main office line",bg:"linear-gradient(135deg,#F7B731,#e8a317)"},
          {i:"💙",t:"988 Crisis Lifeline",n:"988",s:"24/7 mental health",bg:"linear-gradient(135deg,#A55EEA,#8854d0)"},
          {i:"🆘",t:"CARES Crisis Hotline",n:"800-349-9049",s:"Youth mental health",bg:"linear-gradient(135deg,#FC5C65,#eb3b5a)"},
          {i:"👶",t:"Fussy Baby Network",n:"888-431-2229",s:"Infant specialists",bg:"linear-gradient(135deg,#26DE81,#0fb966)"},
          {i:"👨‍👩‍👧‍👦",t:"Metropolitan Family Services",n:"312-655-8357",s:"Post-adoption (Cook)",bg:"linear-gradient(135deg,#4B7BEC,#3867d6)"},
          {i:"🏠",t:"Mimi's House (Lake Co.)",n:"847-242-1126",s:"Foster family advocacy",bg:"linear-gradient(135deg,#F7B731,#e8a317)"},
          {i:"📚",t:"DCFS Life Skills",n:"217-557-2689",s:"Youth ages 14–20",bg:"linear-gradient(135deg,#A55EEA,#8854d0)"},
        ].map((it,i)=><AnimCard key={i} delay={i}><a href={`tel:${it.n.replace(/-/g,"")}`} style={{display:"block",background:"#FFFBF5",border:"2.5px solid #F0E4D8",borderRadius:22,padding:"16px 18px",marginBottom:12,textDecoration:"none",boxShadow:"0 3px 15px rgba(45,27,78,0.04)"}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:50,height:50,borderRadius:16,background:it.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,boxShadow:"0 4px 15px rgba(0,0,0,0.1)",flexShrink:0}}>{it.i}</div>
            <div style={{flex:1}}><div style={{fontFamily:"'Baloo 2',sans-serif",fontWeight:800,fontSize:14,color:"#2D1B4E"}}>{it.t}</div><div style={{fontFamily:"'Baloo 2',sans-serif",fontSize:22,fontWeight:800,color:"#2D1B4E",margin:"1px 0"}}>{it.n}</div><div style={{fontFamily:"'Quicksand',sans-serif",fontSize:12,fontWeight:600,color:"#8B7A6B"}}>{it.s}</div></div>
            <div style={{width:42,height:42,borderRadius:14,background:"linear-gradient(135deg,#26DE81,#20BF6B)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,boxShadow:"0 3px 10px rgba(32,191,107,0.25)",flexShrink:0}}>📞</div>
          </div>
        </a></AnimCard>)}
      </div>}
    </div>

    {/* ═══ BOTTOM NAV ═══ */}
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(255,251,245,0.92)",backdropFilter:"blur(20px)",borderTop:"2px solid #F0E4D8",display:"flex",justifyContent:"space-around",padding:"6px 0 14px",zIndex:50}}>
      {[{id:"home",ic:"🏠",l:"Home"},{id:"events",ic:"📅",l:"Events"},{id:"help",ic:"📞",l:"Helplines"}].map(t=><button key={t.id} className="nav-btn" onClick={()=>{setTab(t.id);setCat(null);setQ("");setShowS(false)}} style={{background: tab===t.id?"linear-gradient(135deg,#FF6B6B15,#F7B73115)":"none",border:tab===t.id?"2px solid #FF6B6B22":"2px solid transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"8px 22px",borderRadius:16,transition:"all 0.2s"}}>
        <span style={{fontSize:24,filter:tab===t.id?"none":"grayscale(0.5)",opacity:tab===t.id?1:0.5,transition:"all 0.2s"}}>{t.ic}</span>
        <span style={{fontSize:11,fontWeight:tab===t.id?800:600,color:tab===t.id?"#FF6B6B":"#8B7A6B",fontFamily:"'Baloo 2',sans-serif"}}>{t.l}</span>
      </button>)}
    </div>

    {showC&&<CountyPicker sel={county} onSel={setCounty} onClose={()=>setShowC(false)}/>}
    {sel&&<Sheet res={sel} onClose={()=>setSel(null)}/>}
    {selEv&&<EventSheet ev={selEv} onClose={()=>setSelEv(null)}/>}
  </div>);
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js').then(function(registration) {
          console.log('SW registered, scope:', registration.scope);

          // Check for updates immediately on load
          registration.update();

          // Check for updates every 60 seconds while the app is open
          setInterval(function() {
            registration.update();
          }, 60000);

          // When a new service worker is found and installed, prompt refresh
          registration.addEventListener('updatefound', function() {
            var newWorker = registration.installing;
            newWorker.addEventListener('statechange', function() {
              if (newWorker.state === 'activated') {
                // New version available — auto-refresh
                window.location.reload();
              }
            });
          });
        }).catch(function(err) {
          console.log('SW registration failed:', err);
        });

        // If a new SW takes over, refresh the page
        var refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      });
    }
  </script>
